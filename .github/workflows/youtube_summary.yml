name: 📺 YouTube Daily Summary

on:
  # 매일 한국 시간 오전 6시 (UTC 21:00 전날)
  schedule:
    - cron: '0 21 * * *'

  # GitHub UI에서 수동 실행 버튼
  workflow_dispatch:
    inputs:
      days_to_check:
        description: '조회할 일수 (기본: 1)'
        required: false
        default: '1'

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # seen_videos.json 커밋을 위해 필요

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: youtube_summary_gitaction/requirements.txt

      - name: 📦 패키지 설치
        run: pip install -r youtube_summary_gitaction/requirements.txt

      - name: 📺 영상 요약 실행
        working-directory: youtube_summary_gitaction
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CHANNELS_TXT: ${{ secrets.YOUTUBE_CHANNELS_TXT }}
          DAYS_TO_CHECK: ${{ github.event.inputs.days_to_check || '1' }}
        run: python main.py

      - name: 💾 seen_videos.json 커밋 (중복 방지 기록 보존)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add youtube_summary_gitaction/seen_videos.json
          git diff --staged --quiet || git commit -m "chore: update seen_videos [skip ci]"
          git push
